services:
  # ── Backend (Node.js / Express) ───────────────────────────────────────────────
  - type: web
    name: oh-lsq-backend
    runtime: node
    region: singapore
    plan: free
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: node dist/index.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false          # paste your Neon URL in Render dashboard
      - key: JWT_SECRET
        sync: false          # paste your secret in Render dashboard
      - key: JWT_EXPIRES_IN
        value: 8h
      - key: OMS_API_KEY
        sync: false          # paste your OMS key in Render dashboard

  # ── Frontend (Static Site) ────────────────────────────────────────────────────
  - type: web
    name: oh-lsq-frontend
    runtime: static
    region: singapore
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        fromService:
          name: oh-lsq-backend
          type: web
          property: host
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
